<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Notifier</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--accent); }

        .field { margin-bottom: 1rem; }

        label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; opacity: 0.8; }

        input, textarea {
            width: 100%;
            padding: 10px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            color: var(--bg);
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        .hint { font-size: 0.75rem; margin-top: 1rem; opacity: 0.5; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>Ghost Notifier</h1>
    
    <div class="field">
        <label>Заголовок (Title)</label>
        <input type="text" id="title" placeholder="Оставьте пустым для 'без названия'">
    </div>

    <div class="field">
        <label>Текст сообщения (Body)</label>
        <textarea id="body" rows="3" placeholder="Оставьте пустым для пустого уведомления"></textarea>
    </div>

    <button onclick="sendNotification()">Отправить уведомление</button>
    
    <p class="hint">Примечание: Браузер может автоматически подставить домен сайта, если заголовок пуст.</p>
</div>

<script>
    async function sendNotification() {
        // Проверяем поддержку API
        if (!("Notification" in window)) {
            alert("Ваш браузер не поддерживает уведомления.");
            return;
        }

        // Запрашиваем разрешение
        if (Notification.permission !== "granted") {
            const permission = await Notification.requestPermission();
            if (permission !== "granted") {
                alert("Нужно разрешение на уведомления!");
                return;
            }
        }

        // Собираем данные
        const title = document.getElementById('title').value || " "; 
        const options = {
            body: document.getElementById('body').value || "",
            icon: "https://cdn-icons-png.flaticon.com/512/1827/1827347.png" // Можно заменить на свою иконку
        };

        // Отправляем
        new Notification(title, options);
    }
</script>

</body>
</html>
